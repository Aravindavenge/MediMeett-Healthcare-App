<!DOCTYPE html>
<html lang="en">
<head>
    <title>Book Appointment - MediMeet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>MediMeet</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="doctors.html">Doctors</a>
        <a href="dashboard.html">Dashboard</a>
    </nav>
</header>

<section class="form-container">
    <h2>Book Appointment</h2>

    <form onsubmit="bookAppointment(event)">
        <input type="text" id="patientName" placeholder="Patient Name" required>

        <select id="doctorName" required>
            <option value="">Select Doctor</option>
            <option>Dr. Rajesh Kumar - Cardiologist</option>
            <option>Dr. Priya Sharma - Dentist</option>
            <option>Dr. Naveen Reddy - Neurologist</option>
        </select>

        <input type="date" id="appointmentDate" required>
        <button type="submit">Confirm Booking</button>
    </form>
</section>

<script src="script.js"></script>
</body>
</html>
